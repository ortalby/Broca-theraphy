package com.aphasia.broca.ui

import android.content.Intent
import android.os.Bundle
import android.speech.RecognitionListener
import android.speech.RecognizerIntent
import android.speech.SpeechRecognizer
import android.view.LayoutInflater
import android.view.View
import android.view.ViewGroup
import android.widget.Toast
import androidx.fragment.app.Fragment
import com.aphasia.broca.MainActivity
import com.aphasia.broca.data.Word
import com.aphasia.broca.databinding.FragmentPracticeBinding
import com.aphasia.broca.util.SpeechEval
import com.aphasia.broca.util.sm2Next

class PracticeFragment : Fragment() {

    private var _b: FragmentPracticeBinding? = null
    private val b get() = _b!!

    private lateinit var word: Word
    private var mitOn = false
    private var sessionAtt = 0
    private var sessionSuc = 0

    private var recognizer: SpeechRecognizer? = null

    private val tts   get() = (requireActivity() as MainActivity).tts
    private val store get() = (requireActivity() as MainActivity).stats

    override fun onCreateView(inflater: LayoutInflater, container: ViewGroup?, savedInstanceState: Bundle?) =
        FragmentPracticeBinding.inflate(inflater, container, false).also { _b = it }.root

    override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
        super.onViewCreated(view, savedInstanceState)
        loadNext()

        b.btnHint.setOnClickListener {
            tts.speak(word.hint.first().toString())
            b.tvWord.text = word.hint
            b.tvWord.setTextColor(resources.getColor(android.R.color.darker_gray, null))
        }

        b.btnHear.setOnClickListener {
            if (mitOn) tts.speakMelodic(word.word) else tts.speak(word.word)
            showFullWord()
        }

        b.btnMic.setOnClickListener { startListening() }

        b.btnMit.setOnClickListener {
            mitOn = !mitOn
            b.btnMit.alpha = if (mitOn) 1.0f else 0.5f
            b.tvMitNote.visibility = if (mitOn) View.VISIBLE else View.GONE
        }

        b.btnRetry.setOnClickListener { loadWord(word) }
        b.btnNext.setOnClickListener  { loadNext() }
    }

    private fun loadNext() = loadWord(store.pickNext())

    private fun loadWord(w: Word) {
        word = w
        b.tvEmoji.text    = w.emoji
        b.tvWord.text     = "_ _ _"
        b.tvWord.textSize = 42f
        b.tvWord.setTextColor(resources.getColor(android.R.color.darker_gray, null))
        val ws = store.get(w.id)
        val pct = if (ws.att > 0) (ws.suc * 100 / ws.att).toString() + "%" else "חדש"
        b.tvWordPct.text = "מילה זו: $pct"
        b.tvSessionBadge.text = "✅ $sessionSuc / $sessionAtt"
        setPhase("ready")
    }

    private fun showFullWord() {
        b.tvWord.text     = word.word
        b.tvWord.textSize = 46f
        b.tvWord.setTextColor(resources.getColor(android.R.color.holo_purple, null))
    }

    private fun setPhase(phase: String) {
        b.phaseReady.visibility = if (phase == "ready") View.VISIBLE else View.GONE
        b.phaseRec.visibility   = if (phase == "rec")   View.VISIBLE else View.GONE
        b.phaseEval.visibility  = if (phase == "eval")  View.VISIBLE else View.GONE
        b.phaseFb.visibility    = if (phase == "fb")    View.VISIBLE else View.GONE
    }

    private fun startListening() {
        if (!SpeechRecognizer.isRecognitionAvailable(requireContext())) {
            Toast.makeText(requireContext(), "זיהוי דיבור לא זמין - נא להתקין Google", Toast.LENGTH_LONG).show()
            return
        }
        tts.stop()
        setPhase("rec")
        recognizer?.destroy()
        recognizer = SpeechRecognizer.createSpeechRecognizer(requireContext()).apply {
            setRecognitionListener(object : RecognitionListener {
                override fun onReadyForSpeech(p: Bundle?) {}
                override fun onBeginningOfSpeech() {}
                override fun onRmsChanged(v: Float) {}
                override fun onBufferReceived(b: ByteArray?) {}
                override fun onPartialResults(p: Bundle?) {}
                override fun onEvent(t: Int, p: Bundle?) {}
                override fun onEndOfSpeech() { setPhase("eval") }

                override fun onError(error: Int) {
                    if (!isAdded) return
                    val msg = if (error == SpeechRecognizer.ERROR_NO_MATCH || error == SpeechRecognizer.ERROR_SPEECH_TIMEOUT)
                        "לא שמעתי 💙 ננסי שוב" else "שגיאה $error - ננסי שוב"
                    showFeedback(false, msg, "")
                }

                override fun onResults(results: Bundle?) {
                    if (!isAdded) return
                    val alts = results?.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION) ?: return
                    val result = SpeechEval.evaluate(alts, word.word)
                    sessionAtt++
                    if (result.ok) sessionSuc++
                    val newStat = sm2Next(store.get(word.id), result.ok)
                    store.set(word.id, newStat)
                    showFeedback(result.ok, result.feedback, alts.firstOrNull() ?: "")
                    tts.speak(if (result.ok) "כל הכבוד" else "ננסי שוב")
                }
            })
            startListening(Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {
                putExtra(RecognizerIntent.EXTRA_LANGUAGE, "he-IL")
                putExtra(RecognizerIntent.EXTRA_LANGUAGE_PREFERENCE, "he-IL")
                putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 5)
                putExtra(RecognizerIntent.EXTRA_CALLING_PACKAGE, requireContext().packageName)
            })
        }
    }

    private fun showFeedback(ok: Boolean, msg: String, heard: String) {
        showFullWord()
        setPhase("fb")
        b.tvFbEmoji.text = if (ok) "🌟" else "💙"
        b.tvFbText.text  = msg
        b.tvHeard.text   = if (heard.isNotEmpty()) "שמעתי: $heard" else ""
        b.tvHeard.visibility = if (heard.isNotEmpty()) View.VISIBLE else View.GONE
        b.btnRetry.visibility = if (!ok) View.VISIBLE else View.GONE
        b.tvSessionBadge.text = "✅ $sessionSuc / $sessionAtt"
        val bg = if (ok) 0xFFECFDF5.toInt() else 0xFFEFF6FF.toInt()
        b.phaseFb.setBackgroundColor(bg)
    }

    override fun onDestroyView() {
        super.onDestroyView()
        recognizer?.destroy()
        _b = null
    }
}
